<style>

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;

    text-decoration: none;

  .tool-card:active { background: #2a2a2a; }
  .tool-card .title {
    font-size: 15px;

    margin-bottom: 4px;

  .tool-card .desc {

  .footer {
